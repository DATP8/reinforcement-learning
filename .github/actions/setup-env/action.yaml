name: "Setup Environment"
description: "Checks out code, sets up Python, installs uv, and syncs dependencies"
runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v6.0.2
    
    - uses: actions/setup-python@v6.2.0
      with:
        python-version: '3.14'
        
    - uses: astral-sh/setup-uv@v7.4.0
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"
    
    - shell: bash
      run: uv sync