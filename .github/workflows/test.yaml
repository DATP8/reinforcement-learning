name: "test"
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  pyrefly-check:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-env
      - run: uv run pyrefly check

  ruff-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/ruff-action@v3.6.1
      - uses: astral-sh/ruff-action@v3.6.1
        with:
          args: 'format --check'

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-env
      - run: uv run python -m unittest discover -v