name: "test"
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  pyrefly-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' 

      - name: Install uv
        uses: astral-sh/setup-uv@v5
    
      - name: Sync packages
        run: uv sync

      - name: Run pyrefly check
        run: uv run pyrefly check

  ruff-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Ruff check
        uses: astral-sh/ruff-action@v3

      - name: Run Ruff format check
        uses: astral-sh/ruff-action@v3
        with:
          args: 'format --check'