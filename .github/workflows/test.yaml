name: "Run type checking, linting, formatting and unit tests"
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  pyrefly-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        name: Checkout Repository

      - uses: ./.github/actions/setup-env
        name: Setup Environment

      - run: uv run pyrefly check --output-format=github
        name: Run Pyrefly Check

  ruff-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        name: Checkout Repository
      
      - uses: astral-sh/ruff-action@v3.6.1
        name: Check Linting
        with:
         args: 'check --fix'

  unit-tests:
    strategy:
        matrix:
            os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6.0.2
        name: Checkout Repository

      - uses: ./.github/actions/setup-env
        name: Setup Environment

      - run: uv run --with pytest --with pytest-github-actions-annotate-failures pytest
        name: Run Unit Tests

  ruff-format:
    runs-on: ubuntu-latest
    needs: [pyrefly-check, ruff-lint, unit-tests]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.2
        name: Checkout Repository

      - uses: astral-sh/ruff-action@v3.6.1
        name: Check Formatting
        with:
          args: 'format'

      - uses: stefanzweifel/git-auto-commit-action@v7.1.0
        name: Commit formatted files
        with:
          commit_message: "style: auto-format code"